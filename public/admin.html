<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easy Top Up — Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #F3F4F6;
            color: #1F2937;
        }

        /* ── HEADER ── */
        .header {
            background: #2E7D32;
            color: white;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
        }

        .header span {
            font-size: 13px;
            opacity: 0.8;
        }

        #logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }

        #logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ── LOGIN SCREEN ── */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #E8F5E9, #C8E6C9);
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            text-align: center;
        }

        .login-card .logo {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .login-card h2 {
            color: #2E7D32;
            font-size: 24px;
            margin-bottom: 4px;
        }

        .login-card p {
            color: #6B7280;
            font-size: 14px;
            margin-bottom: 28px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #E5E7EB;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #2E7D32;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-green {
            background: #2E7D32;
            color: white;
        }

        .btn-red {
            background: #DC2626;
            color: white;
        }

        .btn-orange {
            background: #EA580C;
            color: white;
        }

        .btn-grey {
            background: #F3F4F6;
            color: #6B7280;
            border: 1px solid #E5E7EB;
        }

        .error-msg {
            color: #DC2626;
            font-size: 13px;
            margin-top: 8px;
        }

        /* ── MAIN DASHBOARD ── */
        #dashboard {
            display: none;
        }

        .tabs {
            background: white;
            display: flex;
            gap: 0;
            border-bottom: 2px solid #E5E7EB;
            padding: 0 32px;
        }

        .tab {
            padding: 14px 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #6B7280;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab.active {
            color: #2E7D32;
            border-bottom-color: #2E7D32;
        }

        .tab-content {
            display: none;
            padding: 24px 32px;
        }

        .tab-content.active {
            display: block;
        }

        /* ── STATS BAR ── */
        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 16px 24px;
            flex: 1;
            min-width: 140px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
            border-left: 4px solid #2E7D32;
        }

        .stat-card .number {
            font-size: 28px;
            font-weight: 700;
            color: #2E7D32;
        }

        .stat-card .label {
            font-size: 12px;
            color: #6B7280;
            margin-top: 4px;
        }

        .stat-card.orange {
            border-left-color: #EA580C;
        }

        .stat-card.orange .number {
            color: #EA580C;
        }

        .stat-card.red {
            border-left-color: #DC2626;
        }

        .stat-card.red .number {
            color: #DC2626;
        }

        /* ── SECTION TITLE ── */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #1F2937;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background: #DC2626;
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* ── CARDS ── */
        .card {
            background: white;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .card-info {
            flex: 1;
            min-width: 200px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: #1F2937;
            margin-bottom: 4px;
        }

        .card-sub {
            font-size: 13px;
            color: #6B7280;
            margin-bottom: 4px;
        }

        .type-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 6px;
        }

        .badge-petrol {
            background: #FEF3C7;
            color: #B45309;
        }

        .badge-lpg {
            background: #DBEAFE;
            color: #1D4ED8;
        }

        .badge-ev {
            background: #D1FAE5;
            color: #065F46;
        }

        .badge-pending {
            background: #FEF3C7;
            color: #B45309;
        }

        .badge-approved {
            background: #D1FAE5;
            color: #065F46;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .action-btn:hover {
            opacity: 0.85;
        }

        .btn-approve {
            background: #2E7D32;
            color: white;
        }

        .btn-reject {
            background: #DC2626;
            color: white;
        }

        .btn-delete {
            background: #F3F4F6;
            color: #DC2626;
            border: 1px solid #DC2626;
        }

        /* ── EMPTY STATE ── */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #9CA3AF;
        }

        .empty .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty p {
            font-size: 15px;
        }

        /* ── LOADING ── */
        .loading {
            text-align: center;
            padding: 40px;
            color: #6B7280;
        }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1F2937;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        #toast.show {
            opacity: 1;
        }

        #toast.success {
            background: #2E7D32;
        }

        #toast.error {
            background: #DC2626;
        }

        /* ── CONFIRM DIALOG ── */
        #confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        #confirm-overlay.show {
            display: flex;
        }

        .confirm-box {
            background: white;
            border-radius: 16px;
            padding: 28px;
            max-width: 360px;
            width: 90%;
            text-align: center;
        }

        .confirm-box h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .confirm-box p {
            color: #6B7280;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .confirm-actions {
            display: flex;
            gap: 10px;
        }

        .confirm-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .tabs {
                padding: 0 16px;
            }

            .tab {
                padding: 12px 14px;
                font-size: 12px;
            }

            .tab-content {
                padding: 16px;
            }

            .stats {
                gap: 10px;
            }
        }
    </style>
</head>

<body>

    <!-- ── LOGIN SCREEN ── -->
    <div id="login-screen">
        <div class="login-card">
            <!-- <div class="logo">⛽</div>-->
            <!--<h2>Easy Top Up</h2>-->
            <p>Admin Dashboard </p>
            <input type="email" id="login-email" placeholder="Admin email" />
            <input type="password" id="login-password" placeholder="Password" />
            <button class="btn btn-green" onclick="adminLogin()">Sign In</button>
            <p class="error-msg" id="login-error"></p>
        </div>
    </div>

    <!-- ── DASHBOARD ── -->
    <div id="dashboard">

        <!-- Header -->
        <div class="header">
            <div>
                <h1> Admin</h1>
                <span id="admin-name"></span>
            </div>
            <button id="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('pending')">
                Pending Stations
            </div>
            <div class="tab" onclick="switchTab('stations')">
                All Stations
            </div>
            <div class="tab" onclick="switchTab('reports')">
                Reports
            </div>
        </div>

        <!-- ── PENDING STATIONS TAB ── -->
        <div class="tab-content active" id="tab-pending">
            <div class="stats">
                <div class="stat-card orange">
                    <div class="number" id="pending-count">0</div>
                    <div class="label">Pending Approval</div>
                </div>
            </div>
            <div class="section-title">
                Stations Awaiting Approval
                <span class="badge" id="pending-badge">0</span>
            </div>
            <div id="pending-list">
                <div class="loading">Loading...</div>
            </div>
        </div>

        <!-- ── ALL STATIONS TAB ── -->
        <div class="tab-content" id="tab-stations">
            <div class="stats">
                <div class="stat-card">
                    <div class="number" id="total-stations">0</div>
                    <div class="label">Total Stations</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="petrol-count">0</div>
                    <div class="label">Petrol/Diesel</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="lpg-count">0</div>
                    <div class="label">LPG</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="ev-count">0</div>
                    <div class="label">EV</div>
                </div>
            </div>
            <div class="section-title"> All Stations</div>
            <div id="stations-list">
                <div class="loading">Loading...</div>
            </div>
        </div>

        <!-- ── REPORTS TAB ── -->
        <div class="tab-content" id="tab-reports">
            <div class="stats">
                <div class="stat-card red">
                    <div class="number" id="reports-count">0</div>
                    <div class="label">Total Reports</div>
                </div>
            </div>
            <div class="section-title"> People's Reports</div>
            <div id="reports-list">
                <div class="loading">Loading...</div>
            </div>
        </div>

    </div>

    <!-- ── TOAST ── -->
    <div id="toast"></div>

    <!-- ── CONFIRM DIALOG ── -->
    <div id="confirm-overlay">
        <div class="confirm-box">
            <h3 id="confirm-title">Are you sure?</h3>
            <p id="confirm-message"></p>
            <div class="confirm-actions">
                <button style="background:#F3F4F6;color:#374151" onclick="closeConfirm()">Cancel</button>
                <button id="confirm-ok-btn" style="background:#DC2626;color:white"
                    onclick="confirmAction()">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        // ── CONFIG ──
        const API = 'https://easytopup-finalyearproject.up.railway.app/api';
        let TOKEN = localStorage.getItem('admin_token') || '';

        // ── HELPER: Headers ──
        const headers = () => ({
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${TOKEN}`,
        });

        // ── HELPER: Toast ──
        function showToast(msg, type = '') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `show ${type}`;
            setTimeout(() => t.className = '', 3000);
        }

        // ── HELPER: Confirm Dialog ──
        function showConfirm(title, msg, btnClass, btnLabel, action) {
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-message').textContent = msg;
            const btn = document.getElementById('confirm-ok-btn');
            btn.className = btnClass;
            btn.textContent = btnLabel;
            window.pendingAction = action;
            document.getElementById('confirm-overlay').classList.add('show');
        }

        function closeConfirm() {
            document.getElementById('confirm-overlay').classList.remove('show');
            window.pendingAction = null;
        }

        async function confirmAction() {
            const action = window.pendingAction;
            closeConfirm();
            if (action) await action();
        }

        // ── TYPE BADGE CLASS ──
        function typeBadgeClass(type) {
            if (type === 'Petrol/Diesel') return 'badge-petrol';
            if (type === 'LPG') return 'badge-lpg';
            if (type === 'EV') return 'badge-ev';
            return '';
        }

        // ── LOAD PENDING STATIONS ──
        async function loadPending() {
            try {
                const res = await fetch(`${API}/admin/stations/pending`, { headers: headers() });
                const data = await res.json();
                const stations = data.data || [];

                document.getElementById('pending-count').textContent = stations.length;
                document.getElementById('pending-badge').textContent = stations.length;

                const list = document.getElementById('pending-list');
                if (stations.length === 0) {
                    list.innerHTML = `<div class="empty"><div class="icon">✅</div><p>No pending stations — all caught up!</p></div>`;
                    return;
                }

                list.innerHTML = stations.map(s => `
      <div class="card">
        <div class="card-info">
          <div class="card-title">${escapeHtml(s.name)}</div>
          <div class="card-sub">📍 ${parseFloat(s.lat).toFixed(4)}, ${parseFloat(s.lng).toFixed(4)}</div>
          <div class="card-sub">💰 ${s.price || 'N/A'} | 📞 ${s.phone || 'N/A'}</div>
          <div class="card-sub">👤 Operator: ${s.operator_name || 'Unknown'} (${s.operator_email || ''})</div>
          <span class="type-badge ${typeBadgeClass(s.type)}">${s.type}</span>
        </div>
        <div class="card-actions">
          <button class="action-btn btn-approve" data-id="${s.id}" data-name="${escapeHtml(s.name)}" data-action="approve">✅ Approve</button>
          <button class="action-btn btn-reject" data-id="${s.id}" data-name="${escapeHtml(s.name)}" data-action="reject">❌ Reject</button>
        </div>
      </div>
    `).join('');
            } catch (e) {
                console.error('loadPending error:', e);
            }
        }

        // ── LOAD ALL STATIONS ──
        async function loadStations() {
            try {
                const res = await fetch(`${API}/admin/stations`, { headers: headers() });
                const data = await res.json();
                const stations = data.data || [];

                document.getElementById('total-stations').textContent = stations.length;
                document.getElementById('petrol-count').textContent = stations.filter(s => s.type === 'Petrol/Diesel').length;
                document.getElementById('lpg-count').textContent = stations.filter(s => s.type === 'LPG').length;
                document.getElementById('ev-count').textContent = stations.filter(s => s.type === 'EV').length;

                const list = document.getElementById('stations-list');
                if (stations.length === 0) {
                    list.innerHTML = `<div class="empty"><div class="icon">📍</div><p>No stations yet</p></div>`;
                    return;
                }

                list.innerHTML = stations.map(s => `
      <div class="card">
        <div class="card-info">
          <div class="card-title">${escapeHtml(s.name)}</div>
          <div class="card-sub">💰 ${s.price || 'N/A'} | 📞 ${s.phone || 'N/A'}</div>
          <div class="card-sub">Status: <strong>${s.status}</strong> | Verified: <strong>${s.verified ? '✅' : '❌'}</strong></div>
          ${s.operator_name ? `<div class="card-sub">👤 Operator: ${escapeHtml(s.operator_name)}</div>` : ''}
          <span class="type-badge ${typeBadgeClass(s.type)}">${s.type}</span>
        </div>
        <div class="card-actions">
          ${!s.verified ? `<button class="action-btn btn-approve" data-id="${s.id}" data-name="${escapeHtml(s.name)}" data-action="approve">✅ Approve</button>` : ''}
          <button class="action-btn btn-delete" data-id="${s.id}" data-name="${escapeHtml(s.name)}" data-action="delete">🗑️ Delete</button>
        </div>
      </div>
    `).join('');
            } catch (e) {
                console.error('loadStations error:', e);
            }
        }

        // ── LOAD REPORTS ──
        async function loadReports() {
            try {
                const res = await fetch(`${API}/admin/reports`, { headers: headers() });
                const data = await res.json();
                const reports = data.data || [];

                document.getElementById('reports-count').textContent = reports.length;

                const list = document.getElementById('reports-list');
                if (reports.length === 0) {
                    list.innerHTML = `<div class="empty"><div class="icon">🚩</div><p>No reports submitted yet</p></div>`;
                    return;
                }

                list.innerHTML = reports.map(r => `
      <div class="card">
        <div class="card-info">
          <div class="card-title">${escapeHtml(r.issue_type)}</div>
          <div class="card-sub">📍 Station: <strong>${escapeHtml(r.station_name)}</strong> (${r.station_type})</div>
          <div class="card-sub">👤 Reported by: ${escapeHtml(r.user_name)}</div>
          <div class="card-sub">🕐 ${new Date(r.created_at).toLocaleString()}</div>
          ${r.notes ? `<div class="card-sub">💬 "${escapeHtml(r.notes)}"</div>` : ''}
        </div>
      </div>
    `).join('');
            } catch (e) {
                console.error('loadReports error:', e);
            }
        }

        // ── LOAD ALL ──
        function loadAll() {
            loadPending();
            loadStations();
            loadReports();
        }

        // ── ESCAPE HTML to prevent XSS and broken strings ──
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function (c) {
                return c;
            });
        }

        // ── GLOBAL CLICK HANDLER (DOES THE ACTUAL WORK) ──
        document.addEventListener('click', async function (e) {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;

            const id = btn.dataset.id;
            const name = btn.dataset.name || 'this station';
            const action = btn.dataset.action;

            if (action === 'approve') {
                if (!confirm(`Approve "${name}"? It will appear on the map for all users.`)) return;
                try {
                    const res = await fetch(`${API}/admin/stations/${id}/approve`, { method: 'PUT', headers: headers() });
                    if (!res.ok) throw new Error();
                    showToast(`✅ "${name}" approved!`, 'success');
                    loadAll();
                } catch {
                    showToast('Failed to approve station', 'error');
                }
            }

            if (action === 'reject') {
                if (!confirm(`Reject and remove "${name}"? This cannot be undone.`)) return;
                try {
                    const res = await fetch(`${API}/admin/stations/${id}`, { method: 'DELETE', headers: headers() });
                    if (!res.ok) throw new Error();
                    showToast(`❌ "${name}" rejected`, 'error');
                    loadAll();
                } catch {
                    showToast('Failed to reject station', 'error');
                }
            }

            if (action === 'delete') {
                if (!confirm(`Permanently delete "${name}"? This cannot be undone.`)) return;
                try {
                    const res = await fetch(`${API}/admin/stations/${id}`, { method: 'DELETE', headers: headers() });
                    if (!res.ok) throw new Error();
                    showToast(`🗑️ "${name}" deleted`, 'error');
                    loadAll();
                } catch {
                    showToast('Failed to delete station', 'error');
                }
            }
        });

        // ── INITIAL LOAD ──
        if (TOKEN) {
            loadAll();
        }

        window.adminLogin = adminLogin;
        async function adminLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errEl = document.getElementById('login-error');
            errEl.textContent = '';

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.message);
                if (data.data.role !== 'admin') throw new Error('Admin access required');

                localStorage.setItem('admin_token', data.data.token);
                TOKEN = data.data.token;
                location.reload();
            } catch (e) {
                errEl.textContent = e.message;
            }
        }

    </script>
</body>

</html>
